name: Release Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer version to release, for example 0.2.0
        required: true
        type: string
      prerelease:
        description: Mark GitHub release as prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags --force
          npm run release:check -- "$VERSION"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi

      - name: Validate decks
        run: |
          node --check scripts/deck.mjs
          node --check scripts/release.mjs
          npm run build:all

      - name: Create package
        env:
          VERSION: ${{ inputs.version }}
        run: npm run package -- "$VERSION"

      - name: Create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=(
            "v$VERSION"
            "dist/release/slides-builder-$VERSION.tgz"
            --title "slides-builder v$VERSION"
            --notes "Release v$VERSION of the slides-builder workspace."
          )

          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
