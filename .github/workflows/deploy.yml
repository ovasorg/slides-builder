name: Deploy Slides

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deck to deploy
        required: true
        type: choice
        default: all
        options:
          - all
          - component-showcase
          - platform-engineering-that-teams-actually-adopt
          - custom
      custom_deck:
        description: Deck slug when target is custom
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve deck target
        id: target
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET: ${{ inputs.target }}
          CUSTOM_DECK: ${{ inputs.custom_deck }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            deck="all"
          elif [[ "$TARGET" == "custom" ]]; then
            deck="$CUSTOM_DECK"
          else
            deck="$TARGET"
          fi

          if [[ -z "$deck" ]]; then
            echo "::error::custom_deck is required when target is custom"
            exit 1
          fi

          if [[ "$deck" != "all" && ! "$deck" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid deck slug: $deck"
            exit 1
          fi

          echo "deck=$deck" >> "$GITHUB_OUTPUT"
          echo "Deploy target: $deck"
          npm run list

      - name: Build all decks
        if: steps.target.outputs.deck == 'all'
        run: npm run build:all

      - name: Build selected deck
        if: steps.target.outputs.deck != 'all'
        run: npm run build -- ${{ steps.target.outputs.deck }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
